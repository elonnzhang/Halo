name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.1)'
        required: true

permissions:
  contents: write

jobs:
  build-universal:
    name: Build universal .app
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Test
        run: swift test

      - name: Build universal .app
        run: make app

      - name: Verify slices
        run: |
          lipo -info dist/Halo.app/Contents/MacOS/Halo
          file  dist/Halo.app/Contents/MacOS/Halo

      - name: Read version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Produce arch-thinned variants
        run: |
          bash scripts/thin-app.sh arm64
          bash scripts/thin-app.sh x86_64

      - name: Package zips (universal + arm64 + x86_64)
        run: |
          TAG="${{ steps.version.outputs.tag }}"

          # Each zip extracts to a directory called "Halo.app" regardless of
          # slice; the zip filename carries the arch suffix.
          (cd dist && ditto -c -k --sequesterRsrc --keepParent Halo.app "Halo-${TAG}.zip")
          (cd dist/thin-arm64 && ditto -c -k --sequesterRsrc --keepParent Halo.app "../Halo-${TAG}-arm64.zip")
          (cd dist/thin-x86_64 && ditto -c -k --sequesterRsrc --keepParent Halo.app "../Halo-${TAG}-x86_64.zip")

          ls -lh dist/Halo-${TAG}*.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Halo-${{ steps.version.outputs.tag }}-zips
          path: |
            dist/Halo-${{ steps.version.outputs.tag }}.zip
            dist/Halo-${{ steps.version.outputs.tag }}-arm64.zip
            dist/Halo-${{ steps.version.outputs.tag }}-x86_64.zip
          if-no-files-found: error

      - name: Create / update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          UNIVERSAL="dist/Halo-${TAG}.zip"
          ARM64="dist/Halo-${TAG}-arm64.zip"
          X86="dist/Halo-${TAG}-x86_64.zip"

          NOTES=$(cat <<NOTES_EOF
          Halo $TAG — macOS 12 (Monterey) or later.

          ### Downloads

          - **Halo-${TAG}.zip** — universal (arm64 + x86_64), ~1.4 MB compressed. Pick this if unsure.
          - **Halo-${TAG}-arm64.zip** — Apple Silicon only. Smaller download.
          - **Halo-${TAG}-x86_64.zip** — Intel only. Smaller download.

          Each zip extracts a single \`Halo.app\`. See CHANGELOG.md for details.
          NOTES_EOF
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "==> uploading assets to existing release $TAG"
            gh release upload "$TAG" "$UNIVERSAL" "$ARM64" "$X86" --clobber
            gh release edit "$TAG" --notes "$NOTES"
          else
            echo "==> creating release $TAG"
            gh release create "$TAG" "$UNIVERSAL" "$ARM64" "$X86" \
              --title "Halo $TAG" \
              --notes "$NOTES"
          fi
